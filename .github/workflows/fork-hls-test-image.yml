# FORK-ONLY: builds a pullable test image for the feat/hls-output branch.
# Not intended for upstream; will be dropped from any PR.
name: Fork HLS test image

on:
  push:
    branches:
      - feat/hls-output
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          # Unraid is amd64; single platform keeps builds fast
          platforms: linux/amd64
          build-args: |
            REPO_OWNER=dispatcharr
            REPO_NAME=dispatcharr
            BASE_TAG=base
          tags: |
            ghcr.io/jonzey231/dispatcharr:hls-test
