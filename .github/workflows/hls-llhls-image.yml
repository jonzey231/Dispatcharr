# TEST-ONLY: builds the hls-llhls-test branch and publishes it as the
# ghcr.io/<owner>/dispatcharr:hls-llhls image the 9192 test container pulls to
# try Low-Latency HLS. amd64 only (the Unraid test host). Experimental, not for
# the upstream PR; keep this file on the hls-llhls-test branch.
name: Build HLS LL image

on:
  push:
    branches: [hls-llhls-test]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute metadata
        id: meta
        run: |
          echo "repo_owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "repo_name=$(echo '${{ github.repository }}' | cut -d '/' -f 2 | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push the hls-llhls image (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ steps.meta.outputs.repo_owner }}/${{ steps.meta.outputs.repo_name }}:hls-llhls
          build-args: |
            REPO_OWNER=dispatcharr
            REPO_NAME=dispatcharr
            BASE_TAG=base
            BRANCH=${{ github.ref_name }}
            REPO_URL=https://github.com/${{ github.repository }}
            TIMESTAMP=${{ steps.meta.outputs.timestamp }}
